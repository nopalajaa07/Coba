<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <h1>Budget Tracker</h1>
      <div class="header-right">
        <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙</button>
      </div>
    </header>

    <!-- Balance + Limit Row -->
    <div class="top-row">
      <section class="balance-card">
        <p class="balance-label">Total Spent</p>
        <h2 id="total-balance">Rp 0</h2>
        <p id="limit-warning" class="limit-warning hidden">Over limit!</p>
      </section>
      <section class="limit-section">
        <div class="form-group">
          <label for="currency-select">Currency <span id="rate-status" class="rate-status"></span></label>
          <select id="currency-select">
            <option value="IDR">🇮🇩 IDR — Rupiah</option>
            <option value="USD">🇺🇸 USD — US Dollar</option>
            <option value="EUR">🇪🇺 EUR — Euro</option>
            <option value="GBP">🇬🇧 GBP — British Pound</option>
            <option value="JPY">🇯🇵 JPY — Japanese Yen</option>
            <option value="SGD">🇸🇬 SGD — Singapore Dollar</option>
            <option value="MYR">🇲🇾 MYR — Malaysian Ringgit</option>
            <option value="AUD">🇦🇺 AUD — Australian Dollar</option>
            <option value="KRW">🇰🇷 KRW — Korean Won</option>
            <option value="CNY">🇨🇳 CNY — Chinese Yuan</option>
          </select>
        </div>
        <div class="form-group">
          <label for="spending-limit">Spending Limit</label>
          <div class="limit-row">
            <input type="number" id="spending-limit" placeholder="e.g. 500000" min="0" />
            <button id="set-limit-btn">Set</button>
          </div>
        </div>
      </section>
    </div>

    <!-- Add Transaction Form -->
    <section class="form-section">
      <h3>Add Transaction</h3>
      <form id="transaction-form">
        <div class="form-inline">
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" placeholder="e.g. Coffee" />
          </div>
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" placeholder="e.g. 5.00" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="">Select...</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>
          <div class="form-group form-group-btn">
            <label>&nbsp;</label>
            <button type="submit" class="btn-primary">+ Add</button>
          </div>
        </div>
        <div class="form-inline form-custom-row">
          <div class="form-group">
            <label for="new-custom-cat">Custom Category</label>
            <div class="limit-row">
              <input type="text" id="new-custom-cat" placeholder="New category name" />
              <button type="button" id="add-cat-btn">Add</button>
            </div>
          </div>
        </div>
        <p id="form-error" class="form-error hidden">Please fill in all fields.</p>
      </form>
    </section>

    <!-- Bottom: Transactions + Chart side by side -->
    <div class="bottom-row">

      <!-- Transaction List -->
      <section class="list-section">
        <div class="list-header">
          <h3>Transactions</h3>
          <div class="sort-controls">
            <label for="sort-by">Sort</label>
            <select id="sort-by">
              <option value="date">Date</option>
              <option value="amount-asc">Amount ↑</option>
              <option value="amount-desc">Amount ↓</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list">
          <li class="empty-state">No transactions yet.</li>
        </ul>
      </section>

      <!-- Chart -->
      <section class="chart-section">
        <h3>By Category</h3>
        <div class="chart-wrapper">
          <canvas id="spending-chart"></canvas>
          <p id="chart-empty" class="chart-empty">No data yet.</p>
        </div>
      </section>

    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
